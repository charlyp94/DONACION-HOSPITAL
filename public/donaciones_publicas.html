<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Donaciones Recibidas - Hospital Luis A. Güemes</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f4f4f4; 
            padding: 20px; 
        }
        .container {
             max-width: 800px;
             margin: 0 auto; 
             background: white; 
             padding: 20px; 
             border-radius: 8px; 
             box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            }
        h2 { 
            color: #4a2c35; 
            text-align: center;
         }
        table { 
            width: 100%;
            border-collapse: collapse; 
            margin-top: 20px; 
        }
        th { 
            background-color: #332126; 
            color: white; 
            padding: 12px; 
        }
        td { 
            padding: 12px; 
            text-align: center; 
            border-bottom: 1px solid #ddd;
         }
        .btn-volver { 
            display: block; 
            width: 150px; 
            margin: 20px auto; 
            padding: 10px; 
            background: #4a2c35;
            color: white; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 5px; 
        }
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* CAMBIO CLAVE: Ajustamos ancho y alto distintos para forzar el óvalo */
            width: 550px;  /* Más ancho */
            height: 480px; /* Menos alto */
            border-radius: 50%; /* Esto estira las esquinas convirtiéndolo en un óvalo */
            overflow: hidden; /* Corta lo que quede fuera del óvalo si es necesario */
            background-image: url('../img/logo.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.15; 
            z-index: -1;   
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Donaciones Aprobadas y Destinadas</h2>
        <table id="tabla-publica">
            <thead>
                <tr>
                    <th>Nombre / Empresa</th>
                    <th>Fecha</th>
                    <th>Categoría</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
        <a href="index.html" class="btn-volver">Volver al Inicio</a>
    </div>

    <script>
        async function cargarDonacionesPublicas() {
            try {
                const res = await fetch('/api/donaciones');
                const datos = await res.json();
                const cuerpo = document.getElementById('cuerpo-tabla');
                
                // Filtramos y renderizamos
                cuerpo.innerHTML = datos
                    .filter(d => d.estado === 'Aprobado y Destinado')
                    .map(d => `
                        <tr>
                            <td>${d.nombre}</td>
                            <td>${new Date(d.fecha).toLocaleDateString('es-AR')}</td>
                            <td>${d.categoria}</td>
                        </tr>
                    `).join('');
            } catch (error) {
                console.error("Error al cargar datos públicos:", error);
            }
        }
        cargarDonacionesPublicas();
    </script>
</body>
</html>
